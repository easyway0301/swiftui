<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>匯款代碼查詢App</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --main: #f97316;
      /* 溫暖橘 */
      --accent: #38bdf8;
      /* 友善藍 */
      --soft: #fff7ed;
      /* 米白背景 */
      --card: #ffffff;
      --text: #374151;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Noto Sans TC', sans-serif;
      background: linear-gradient(180deg, #fff7ed, #fef3c7);
      color: var(--text);
    }

    /* ===== HERO ===== */
    .hero {
      padding: 90px 20px 70px;
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 900;
      color: #ea580c;
    }

    .hero p {
      max-width: 720px;
      margin: 22px auto;
      font-size: 1.2rem;
      color: #6b7280;
    }

    .btn-main {
      display: inline-block;
      padding: 14px 30px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      background: linear-gradient(90deg, #fb923c, #f97316);
      box-shadow: 0 10px 25px rgba(249, 115, 22, .35);
      transition: all .3s ease;
    }

    .btn-main:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 35px rgba(249, 115, 22, .5);
    }

    /* ===== CONTENT ===== */
    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px 80px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 26px;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, .08);
      transition: transform .25s ease, box-shadow .25s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 22px 45px rgba(249, 115, 22, .25);
    }

    .card h2 {
      margin-top: 0;
      font-size: 1.4rem;
      color: #ea580c;
    }

    .card p {
      line-height: 1.7;
      color: #6b7280;
    }

    .card a {
      display: inline-block;
      margin-top: 14px;
      font-weight: 700;
      color: #0284c7;
      text-decoration: none;
    }

    /* ===== STATS ===== */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 22px;
      margin-top: 60px;
    }

    .stat {
      text-align: center;
      padding: 32px 20px;
      background: linear-gradient(180deg, #fff, #ffedd5);
      border-radius: 18px;
      box-shadow: inset 0 0 25px rgba(249, 115, 22, .15);
    }

    .stat h3 {
      font-size: 2.4rem;
      margin: 0;
      color: #f97316;
    }

    .stat span {
      color: #6b7280;
      font-weight: 600;
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 28px;
      color: #9ca3af;
      font-size: .9rem;
    }

    .contact-email {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .contact-card {
      text-align: center;
    }

    .contact-icons {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 22px;
    }

    .contact-icons a {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #fff7ed;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f97316;
      box-shadow: 0 8px 18px rgba(249, 115, 22, .25);
      transition: all .25s ease;
    }

    .contact-icons a svg {
      width: 24px;
      height: 24px;
    }

    .contact-icons a:hover {
      transform: translateY(-4px);
      background: linear-gradient(135deg, #fb923c, #f97316);
      color: #ffffff;
      box-shadow: 0 14px 30px rgba(249, 115, 22, .45);
    }
  </style>
</head>

<body>

  <section class="hero">
    <h1>匯款代碼查詢App</h1>
    <p>
      查詢Atm代碼及通匯代碼，只需要輸入部份關鍵字或輸入代碼皆可。
    </p>

    <a class="btn-main"
      href="https://apps.apple.com/tw/app/%E9%83%B5%E9%81%9E%E5%8D%80%E8%99%9F/id6450789130"
      target="_blank">
      立即安裝，開始練習
    </a>
    <p>for iPhone/ iPad</p>
  </section>

  <section class="container">

    <div class="grid">
      <div class="card">
        <h2>🛠 不定期更新</h2>
        <p>
          平均每3-5天主動檢查與更新，減少填錯匯款代碼的風險。
        </p>
      </div>

      <div class="card">
        <h2>⚡ 快速查詢・不囉嗦</h2>
        <p>
          快速查詢，只需要輸入部份關鍵字或輸入代碼。
        </p>
      </div>

      <div class="card">
        <h2>📝 一鍵複製功能</h2>
        <p>
          點一下即可複製，或撥打電話，或導航到該銀行。
        </p>
      </div>
    </div>

  </section>

<section class="container">
    <div class="card contact-card">
      <h2>📮 聯絡我們</h2>
      <p>
        若您在使用上有任何問題、建議，或發現內容需要調整，
        歡迎隨時與我們聯繫。
      </p>

      <div class="contact-icons">
        <!-- Email -->
        <a href="mailto:easyway0301@gmail.com" aria-label="Email 聯絡">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
        </a>

        <!-- Facebook -->
        <a href="https://www.facebook.com/profile.php?id=100094402410164&mibextid=LQQJ4d" target="_blank" aria-label="Facebook 粉絲頁">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.99 3.66 9.13 8.44 9.88v-6.99H7.9V12h2.54V9.8c0-2.5 1.49-3.89 3.77-3.89
          1.09 0 2.23.2 2.23.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.78l-.44 2.89h-2.34v6.99C18.34 21.13 22 16.99 22 12z" />
          </svg>
        </a>
      </div>
    </div>

  </section>

  <footer>
    © 2023 EasyWay Develop. All rights reserved.
  </footer>

</body>

</html>
